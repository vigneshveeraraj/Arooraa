  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

uot;#E0803A&quot;,&quot;options&quot;:[&quot;#6D5DFB&quot;,&quot;#2563EB&quot;,&quot;#0EA5A4&quot;,&quot;#E0803A&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;showAssistant&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Sections&quot;},&quot;showMetrics&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Sections&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    chatOpen: false,\n    sending: false,\n    input: \"\",\n    messages: [\n      { text: \"Hi! I'm MESA AI 👋 Ask me anything about how MESA can help your restaurant — ordering, kitchen, billing, or booking a demo.\", isBot: true, isUser: false }\n    ]\n  };\n\n  componentDidMount() {\n    // apply accent tweak via CSS var\n    const accent = this.props.accent;\n    if (accent) {\n      document.documentElement.style.setProperty(\"--accent\", accent);\n    }\n    // scroll reveals (set hidden synchronously to avoid flash)\n    const reveal = (el) => {\n      el.style.transitionDelay = (el.getAttribute(\"data-reveal-delay\") || 0) + \"ms\";\n      el.style.opacity = \"1\";\n      el.style.transform = \"none\";\n      el.setAttribute(\"data-revealed\", \"1\");\n    };\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach((e) => {\n        if (e.isIntersecting) { reveal(e.target); io.unobserve(e.target); }\n      });\n    }, { threshold: 0.12, rootMargin: \"0px 0px -8% 0px\" });\n    document.querySelectorAll(\"[data-reveal]\").forEach((el) => {\n      el.style.transition = \"opacity .7s cubic-bezier(.16,1,.3,1), transform .7s cubic-bezier(.16,1,.3,1)\";\n      if (el.getBoundingClientRect().top < window.innerHeight) {\n        reveal(el);\n      } else {\n        el.style.opacity = \"0\";\n        el.style.transform = \"translateY(26px)\";\n        io.observe(el);\n      }\n    });\n    this._io = io;\n    this._revealTimer = setTimeout(() => {\n      document.querySelectorAll(\"[data-reveal]:not([data-revealed])\").forEach(reveal);\n    }, 1200);\n    // nav scroll state\n    this._onScroll = () => {\n      const n = document.getElementById(\"aroo-nav\");\n      if (!n) return;\n      if (window.scrollY > 24) {\n        n.style.background = \"rgba(8,8,12,0.72)\";\n        n.style.borderBottomColor = \"rgba(255,255,255,0.08)\";\n        n.style.backdropFilter = \"blur(20px)\";\n        n.style.webkitBackdropFilter = \"blur(20px)\";\n      } else {\n        n.style.background = \"transparent\";\n        n.style.borderBottomColor = \"transparent\";\n        n.style.backdropFilter = \"blur(0px)\";\n        n.style.webkitBackdropFilter = \"blur(0px)\";\n      }\n    };\n    window.addEventListener(\"scroll\", this._onScroll, { passive: true });\n    this._onScroll();\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener(\"scroll\", this._onScroll);\n    if (this._io) this._io.disconnect();\n    clearTimeout(this._revealTimer);\n  }\n\n  _scrollChat() {\n    requestAnimationFrame(() => {\n      if (this._chatEl) this._chatEl.scrollTop = this._chatEl.scrollHeight;\n    });\n  }\n\n  async _ask(q) {\n    const query = (q || \"\").trim();\n    if (!query || this.state.sending) return;\n    this.setState((s) => ({\n      messages: [...s.messages, { text: query, isBot: false, isUser: true }],\n      input: \"\",\n      sending: true\n    }));\n    this._scrollChat();\n    let reply;\n    try {\n      if (window.claude && window.claude.complete) {\n        const prompt =\n          \"You are MESA AI, the warm, concise sales consultant on Arooraa's website. \" +\n          \"Arooraa is an AI-first product engineering company. MESA is its flagship: an AI-powered restaurant operating platform covering QR ordering, table/dining sessions, kitchen display, order management, billing, owner dashboard, analytics, and AI insights. \" +\n          \"Answer in 2-4 short sentences, friendly and clear. When relevant, encourage booking a demo. Do not invent pricing. \" +\n          \"Customer question: \" + query;\n        reply = await window.claude.complete(prompt);\n      } else {\n        reply = \"MESA connects ordering, kitchen, billing and analytics into one flow so service stays fast and you get real-time visibility. Want me to help you book a live demo?\";\n      }\n    } catch (err) {\n      reply = \"Sorry, I had trouble responding just now. You can book a demo any time and our team will walk you through MESA.\";\n    }\n    this.setState((s) => ({\n      messages: [...s.messages, { text: (reply || \"\").trim(), isBot: true, isUser: false }],\n      sending: false\n    }));\n    this._scrollChat();\n  }\n\n  renderVals() {\n    return {\n      showAssistant: this.props.showAssistant !== false,\n      showMetrics: this.props.showMetrics !== false,\n      chatOpen: this.state.chatOpen,\n      sending: this.state.sending,\n      input: this.state.input,\n      messages: this.state.messages,\n      chatScrollRef: (el) => { this._chatEl = el; },\n      toggleChat: () => this.setState((s) => ({ chatOpen: !s.chatOpen })),\n      onInput: (e) => this.setState({ input: e.target.value }),\n      onKey: (e) => { if (e.key === \"Enter\") { e.preventDefault(); this._ask(this.state.input); } },\n      send: () => this._ask(this.state.input),\n      askAbout: (e) => this._ask(e.currentTarget.getAttribute(\"data-q\")),\n      features: [\n        { icon: \"📱\", title: \"Digital Menu & QR Ordering\", desc: \"Guests scan, browse a rich menu and order from the table — no app, no waiting.\", isAvail: true, isPreview: false, isRoadmap: false },\n        { icon: \"🍽️\", title: \"Table & Session Management\", desc: \"Track every dining session from seating to settle, across the whole floor.\", isAvail: true, isPreview: false, isRoadmap: false },\n        { icon: \"🔥\", title: \"Kitchen Display System\", desc: \"Live tickets, prep timers and clear station routing keep the kitchen calm.\", isAvail: true, isPreview: false, isRoadmap: false },\n        { icon: \"📋\", title: \"Order Management\", desc: \"Every order synced across customer, waiter, kitchen and billing in real time.\", isAvail: true, isPreview: false, isRoadmap: false },\n        { icon: \"💳\", title: \"Billing & Payment Flow\", desc: \"Fast, accurate bills with split, discount and tax handling in one tap.\", isAvail: true, isPreview: false, isRoadmap: false },\n        { icon: \"📊\", title: \"Owner Dashboard\", desc: \"Sales, prep times and table turns — real-time visibility into your business.\", isAvail: true, isPreview: false, isRoadmap: false },\n        { icon: \"✦\", title: \"AI Restaurant Intelligence\", desc: \"Actionable insights on offers, staffing and menu performance.\", isAvail: false, isPreview: true, isRoadmap: false },\n        { icon: \"🏢\", title: \"Super Admin Console\", desc: \"Manage outlets, roles and configuration from one control plane.\", isAvail: false, isPreview: true, isRoadmap: false },\n        { icon: \"🌐\", title: \"Multi-branch Readiness\", desc: \"Built to scale from a single outlet to a growing restaurant group.\", isAvail: false, isPreview: false, isRoadmap: true },\n        { icon: \"🧼\", title: \"Operations & Hygiene\", desc: \"Checklists and operational tracking for consistent daily standards.\", isAvail: false, isPreview: false, isRoadmap: true }\n      ],\n      posts: [\n        { tag: \"Operations\", title: \"Why QR ordering is only the entry point\", read: \"6 min read\", grad: \"linear-gradient(135deg,#A78BFA,#6D5DFB)\" },\n        { tag: \"AI\", title: \"What AI-first really means for restaurants\", read: \"5 min read\", grad: \"linear-gradient(135deg,#FDBA74,#F97362)\" },\n        { tag: \"Kitchen\", title: \"Cutting prep time with a live display system\", read: \"4 min read\", grad: \"linear-gradient(135deg,#5EEAD4,#3B82F6)\" }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
